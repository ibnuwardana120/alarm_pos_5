<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Alarm - Pos 5</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 30px; }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .sub { color: #7f8c8d; font-size: 13px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .status-box { padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-bottom: 15px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-on { background: #2ecc71; }
        .status-off { background: #95a5a6; }
        .alarm-safe { background: #3498db; }
        .alarm-triggered { background: #e74c3c; animation: blink 1s infinite; }
        
        .log-section { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; text-align: left; }
        th { background: #f8f9fa; color: #2c3e50; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .bg-on { background: #2ecc71; } .bg-off { background: #7f8c8d; } .bg-trigger { background: #e74c3c; } .bg-reset { background: #e67e22; }
        
        .btn-excel { width: 100%; background: #27ae60; color: white; padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-excel:hover { background: #219653; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>MONITOR ALARM POS 5</h2>
    <div class="sub">Cloud Monitoring & Report Center</div>

    <div id="sysStatusBox" class="status-box status-off">🛡️ SISTEM: MENGHUBUNGKAN...</div>
    <div id="alarmStatusBox" class="status-box alarm-safe">✅ KONDISI: MENGHUBUNGKAN...</div>
</div>

<div class="log-section">
    <h3 style="margin: 0; color: #2c3e50;">📋 Riwayat Aktivitas Pos 5</h3>
    <button class="btn-excel" onclick="downloadExcel()">📥 DOWNLOAD DATA KE EXCEL</button>
    
    <table id="tableLog">
        <thead>
            <tr>
                <th>Waktu Log</th>
                <th>Status Kejadian</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBzwsnQox5fZ6qOrNQtrIOa0ftYMKdI-qs",
        authDomain: "alarm-pos-5.firebaseapp.com",
        databaseURL: "https://alarm-pos-5-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "alarm-pos-5",
        storageBucket: "alarm-pos-5.firebasestorage.app",
        messagingSenderId: "127800464063",
        appId: "1:127800464063:web:6c217f674e78c78b4aac0a"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 1. Ambil Kondisi Alat Real-Time
    database.ref('status').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            const sysBox = document.getElementById('sysStatusBox');
            if(data.sistemAktif) {
                sysBox.innerHTML = "🛡️ ALARM POS 5: SIAGA (ON)";
                sysBox.className = "status-box status-on";
            } else {
                sysBox.innerHTML = "📴 ALARM POS 5: NONAKTIF (OFF)";
                sysBox.className = "status-box status-off";
            }

            const alarmBox = document.getElementById('alarmStatusBox');
            if(data.alarmSedangBunyi) {
                alarmBox.innerHTML = "⚠️ PERINGATAN! SIRINE BERBUNYI";
                alarmBox.className = "status-box alarm-triggered";
            } else {
                alarmBox.innerHTML = "✅ SITUASI POS 5 AMAN";
                alarmBox.className = "status-box alarm-safe";
            }
        }
    });

    let dataLogArray = [];

    // 2. Ambil Riwayat Log Cloud Real-Time
    database.ref('riwayat_log').on('value', (snapshot) => {
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = ""; 
        dataLogArray = [];    

        snapshot.forEach((childSnapshot) => {
            const logData = childSnapshot.val();
            let labelStatus = "";
            let classBadge = "";

            if (logData.status == 1)      { labelStatus = "SYSTEM ON"; classBadge = "bg-on"; }
            else if (logData.status == 2) { labelStatus = "SYSTEM OFF"; classBadge = "bg-off"; }
            else if (logData.status == 3) { labelStatus = "ALARM TRIGGER"; classBadge = "bg-trigger"; }
            else if (logData.status == 4) { labelStatus = "RESET ALARM"; classBadge = "bg-reset"; }

            dataLogArray.push({ waktu: logData.waktu, status: labelStatus });

            let row = `<tr>
                <td>${logData.waktu}</td>
                <td><span class="badge ${classBadge}">${labelStatus}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    });

    // 3. Fungsi Ekspor Excel Otomatis dengan Force Sep Koma (Anti-Berantakan)
    function downloadExcel() {
        if (dataLogArray.length === 0) {
            alert("Belum ada data log yang bisa diunduh!");
            return;
        }

        // Ditambahkan 'sep=,' agar Excel Regional manapun otomatis membaca pembatas kolom dengan benar
        let csvContent = "data:text/csv;charset=utf-8,sep=,\n";
        csvContent += "Waktu Log,Status Kejadian\n"; 

        dataLogArray.forEach((row) => {
            csvContent += `${row.waktu},${row.status}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Laporan_Log_Alarm_Pos5.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
